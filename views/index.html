<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookShell - Sistema de Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos gerais e tema escuro inspirado no shadcn */
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #1c1c1f;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --error: #ef4444;
            --border: #27272a;
            --ring: rgba(139, 92, 246, 0.3);
            --radius: 0.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            position: relative;
        }

        /* Animação de background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            animation: float 15s linear infinite;
        }

        .bg-animation span:nth-child(1) {
            top: 10%;
            left: 20%;
            width: 80px;
            height: 80px;
            animation-delay: 0s;
        }

        .bg-animation span:nth-child(2) {
            top: 40%;
            left: 70%;
            width: 60px;
            height: 60px;
            animation-delay: 2s;
            animation-duration: 17s;
        }

        .bg-animation span:nth-child(3) {
            top: 70%;
            left: 30%;
            width: 100px;
            height: 100px;
            animation-delay: 4s;
            animation-duration: 13s;
        }

        .bg-animation span:nth-child(4) {
            top: 20%;
            left: 80%;
            width: 50px;
            height: 50px;
            animation-delay: 6s;
            animation-duration: 19s;
        }

        .bg-animation span:nth-child(5) {
            top: 80%;
            left: 10%;
            width: 70px;
            height: 70px;
            animation-delay: 8s;
            animation-duration: 14s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.5;
                border-radius: 50%;
            }
            50% {
                transform: translateY(-100px) rotate(180deg);
                opacity: 0.8;
                border-radius: 30%;
            }
            100% {
                transform: translateY(-200px) rotate(360deg);
                opacity: 0.1;
                border-radius: 50%;
            }
        }

        .container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            animation: fadeIn 0.6s ease-out;
            position: relative;
            margin: 2rem 0;
            max-height: calc(100vh - 4rem);
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Botão de alternar entre login e registro */
        .toggle-auth {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 40px;
            height: 40px;
            background-color: rgba(139, 92, 246, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .toggle-auth:hover {
            background-color: var(--accent);
            transform: scale(1.05);
        }

        .toggle-auth svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-primary);
            transition: all 0.3s ease;
        }

        .toggle-auth:hover svg {
            stroke: white;
        }

        /* Tooltip para o botão de alternar */
        .tooltip {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 8px;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.3rem 0.6rem;
            border-radius: var(--radius);
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            pointer-events: none;
        }

        .toggle-auth:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        .header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            flex-shrink: 0;
        }

        .logo {
            width: 64px;
            height: 64px;
            background-color: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1rem;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .logo svg {
            width: 32px;
            height: 32px;
            stroke: white;
            fill: none;
        }

        .title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .form-container {
            padding: 1.5rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--ring);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .button {
            display: block;
            width: 100%;
            padding: 0.9rem;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(139, 92, 246, 0.4);
        }

        /* Formulários */
        #loginForm, #registerForm {
            display: none;
        }

        .active-form {
            display: block !important;
            animation: fadeIn 0.5s ease;
        }

        .form-footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .form-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            body {
                padding: 0;
                align-items: flex-start;
            }
            
            .container {
                max-width: 100%;
                height: 100%;
                max-height: none;
                border-radius: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
            }

            .form-container {
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
    </style>
</head>
<body>
    <!-- Animação de background -->
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">
        <!-- Botão de alternar entre login e registro -->
        <div class="toggle-auth" id="toggleAuth">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="8.5" cy="7" r="4"></circle>
                <line x1="20" y1="8" x2="20" y2="14"></line>
                <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
            <div class="tooltip" id="authTooltip">Registrar</div>
        </div>

        <div class="header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
            </div>
            <h1 class="title">BookShell</h1>
            <p class="subtitle" id="authSubtitle">Sistema de Gerenciamento de Biblioteca</p>
        </div>

        <div class="form-container">
            <!-- Formulário de Login -->
            <div id="loginForm" class="active-form">
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                    <button type="submit" class="button" id="loginButton">Acessar Biblioteca</button>
                    <div class="form-footer">
                        Não tem uma conta? <a id="showRegisterLink">Registre-se</a>
                    </div>
                </form>
            </div>

            <!-- Formulário de Registro -->
            <div id="registerForm">
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="fullName">Nome Completo</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Digite seu nome completo" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Telefone</label>
                        <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" maxlength="15" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="newUsername">Usuário</label>
                        <input type="text" id="newUsername" name="newUsername" placeholder="Escolha um nome de usuário" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Senha</label>
                        <input type="password" id="newPassword" name="newPassword" placeholder="Escolha uma senha" required>
                    </div>
                    <button type="submit" class="button" id="registerButton">Registrar</button>
                    <div class="form-footer">
                        Já tem uma conta? <a id="showLoginLink">Faça login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const socket = new WebSocket("ws://aff8-2804-41a0-3f06-5b00-80f6-c1cd-f58e-140e.ngrok-free.app");
        socket.addEventListener('open', () => {
            console.log("Conectado ao WebSocket");
        });
        socket.addEventListener('message', (msg) => {
            const response = JSON.parse(msg["data"]);
            const action = response["action"];

            switch (action) {
                case 'connection:opened': {
                    localStorage.setItem("sessionId", response['sessionId']);
                    break;
                }
            }

        })
        socket.addEventListener('error', (error) => {
            console.error("Erro na conexão WebSocket:", error);
        });

        // Elementos do DOM
        const toggleAuth = document.getElementById('toggleAuth');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const authSubtitle = document.getElementById('authSubtitle');
        const authTooltip = document.getElementById('authTooltip');
        const showRegisterLink = document.getElementById('showRegisterLink');
        const showLoginLink = document.getElementById('showLoginLink');
        const loginFormElement = document.getElementById('loginFormElement');
        const registerFormElement = document.getElementById('registerFormElement');
        const cpfInput = document.getElementById('cpf');
        const phoneInput = document.getElementById('phone');

        // Estado inicial
        let isLoginMode = true;

        // Formatador de CPF
        if (cpfInput) {
            cpfInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 11) {
                    value = value.slice(0, 11);
                }
                
                if (value.length > 9) {
                    value = value.replace(/^(\d{3})(\d{3})(\d{3})(\d{1,2})$/, '$1.$2.$3-$4');
                } else if (value.length > 6) {
                    value = value.replace(/^(\d{3})(\d{3})(\d{1,3})$/, '$1.$2.$3');
                } else if (value.length > 3) {
                    value = value.replace(/^(\d{3})(\d{1,3})$/, '$1.$2');
                }
                
                e.target.value = value;
            });
        }

        // Formatador de Telefone
        if (phoneInput) {
            phoneInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 11) {
                    value = value.slice(0, 11);
                }
                
                if (value.length > 10) {
                    value = value.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
                } else if (value.length > 6) {
                    value = value.replace(/^(\d{2})(\d{4,5})(\d{0,4})$/, '($1) $2-$3');
                } else if (value.length > 2) {
                    value = value.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
                }
                
                e.target.value = value;
            });
        }

        // Função para alternar entre login e registro
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                // Mudar para modo de login
                loginForm.classList.add('active-form');
                registerForm.classList.remove('active-form');
                authSubtitle.textContent = 'Sistema de Gerenciamento de Biblioteca';
                authTooltip.textContent = 'Registrar';
                toggleAuth.querySelector('svg').innerHTML = `
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                `;
            } else {
                // Mudar para modo de registro
                loginForm.classList.remove('active-form');
                registerForm.classList.add('active-form');
                authSubtitle.textContent = 'Crie sua conta na biblioteca';
                authTooltip.textContent = 'Login';
                toggleAuth.querySelector('svg').innerHTML = `
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                `;
            }
            
            // Rolar para o topo do formulário quando alternar
            document.querySelector('.form-container').scrollTop = 0;
        }

        // Event listeners
        toggleAuth.addEventListener('click', toggleAuthMode);
        
        showRegisterLink.addEventListener('click', function() {
            if (isLoginMode) toggleAuthMode();
        });
        
        showLoginLink.addEventListener('click', function() {
            if (!isLoginMode) toggleAuthMode();
        });

        // Simulação de login
        loginFormElement.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const button = document.getElementById('loginButton');
            const originalText = button.textContent;
            
            button.textContent = 'Processando...';
            button.disabled = true;
            
            const username = document.getElementsByName("username")[0].value;
            const password = document.getElementsByName("password")[0].value;

            socket.send(JSON.stringify({ "action": "user:login", "payload": { username, password } }));
            socket.addEventListener("message", (msg) => {
                const msgParsed = JSON.parse(msg.data);

                if (msgParsed["action"] == "user:login") {
                    if (msgParsed["response"] !== "OK") {
                        button.textContent = originalText;
                        button.disabled = false;
                      
                        return alert(`❌ ${username}, suas credenciais estão inválidas. Tente novamente.`);
                    } else { 
                        button.textContent = originalText;
                        button.disabled = false;
                        
                        return alert(`✅ ${username}, seu acesso à biblioteca foi concedido. Verifique o terminal.`);
                    }
                }
            });
        });

        // Simulação de registro
        registerFormElement.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const button = document.getElementById('registerButton');
            const originalText = button.textContent;
            button.textContent = 'Processando...';
            button.disabled = true;
            
            // Simulando um processo de registro
            setTimeout(() => {
                alert('Registro realizado com sucesso! Você já pode fazer login.');
                button.textContent = originalText;
                button.disabled = false;
                toggleAuthMode(); // Voltar para o modo de login
            }, 1500);
        });

        // Animação dos elementos flutuantes no background
        document.addEventListener('DOMContentLoaded', function() {
            const bgAnimation = document.querySelector('.bg-animation');
            const spans = bgAnimation.querySelectorAll('span');
            
            spans.forEach(span => {
                const randomX = Math.random() * 100;
                const randomY = Math.random() * 100;
                span.style.left = `${randomX}%`;
                span.style.top = `${randomY}%`;
            });
        });
    </script>
</body>
</html>
