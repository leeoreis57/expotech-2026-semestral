<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech - Sistema de Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #080c10;
            --bg-secondary: #0d1117;
            --bg-card: #111827;
            --text-primary: #e2e8f0;
            --text-secondary: #64748b;
            --text-muted: #475569;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-hover: #16a34a;
            --gradient: linear-gradient(135deg, #3b82f6 0%, #22c55e 100%);
            --gradient-subtle: linear-gradient(135deg, rgba(59,130,246,0.15) 0%, rgba(34,197,94,0.15) 100%);
            --error: #f87171;
            --border: #1e293b;
            --border-focus: #3b82f6;
            --ring-blue: rgba(59, 130, 246, 0.25);
            --ring-green: rgba(34, 197, 94, 0.25);
            --radius: 0.75rem;
            --radius-sm: 0.5rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            min-height: 100vh;
        }

        /* Background com mesh gradient animado */
        .bg-mesh {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .bg-mesh::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
            top: -200px;
            left: -150px;
            animation: drift1 20s ease-in-out infinite alternate;
        }

        .bg-mesh::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(34,197,94,0.10) 0%, transparent 70%);
            bottom: -150px;
            right: -100px;
            animation: drift2 18s ease-in-out infinite alternate;
        }

        .bg-orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%);
            top: 40%;
            left: 60%;
            animation: drift3 25s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(80px, 60px) scale(1.1); }
        }
        @keyframes drift2 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-60px, -40px) scale(1.15); }
        }
        @keyframes drift3 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(-40px, 30px) scale(0.9); }
        }

        /* Grid pattern */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.5s ease-out;
            position: relative;
            margin: 2rem 0;
        }

        /* Card principal */
        .card {
            background: var(--bg-card);
            border-radius: 1.25rem;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(59,130,246,0.05),
                0 20px 40px rgba(0,0,0,0.4),
                0 1px 2px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Barra de gradiente no topo */
        .card-accent-bar {
            height: 3px;
            background: var(--gradient);
        }

        /* Botão alternar */
        .toggle-auth {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            width: 36px;
            height: 36px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.25s ease;
            z-index: 10;
        }

        .toggle-auth:hover {
            background: rgba(59,130,246,0.2);
            border-color: var(--accent-blue);
            transform: scale(1.08);
            box-shadow: 0 0 12px rgba(59,130,246,0.3);
        }

        .toggle-auth svg {
            width: 18px;
            height: 18px;
            stroke: #93c5fd;
            transition: stroke 0.25s;
        }

        .toggle-auth:hover svg { stroke: #bfdbfe; }

        .tooltip {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: var(--text-primary);
            padding: 0.3rem 0.7rem;
            border-radius: 0.4rem;
            font-size: 0.72rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            pointer-events: none;
            font-weight: 500;
        }

        .toggle-auth:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* Header */
        .header {
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            position: relative;
        }

        .logo-wrap {
            position: relative;
            display: inline-flex;
            margin-bottom: 1.25rem;
        }

        .logo {
            width: 68px;
            height: 68px;
            background: var(--gradient);
            border-radius: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow:
                0 0 0 6px rgba(59,130,246,0.08),
                0 8px 24px rgba(59,130,246,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo:hover {
            transform: translateY(-2px);
            box-shadow:
                0 0 0 8px rgba(59,130,246,0.1),
                0 12px 32px rgba(59,130,246,0.4);
        }

        .logo svg {
            width: 30px;
            height: 30px;
            stroke: white;
            fill: none;
        }

        .logo-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 22px;
            height: 22px;
            background: var(--accent-green);
            border-radius: 50%;
            border: 2px solid var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-badge svg {
            width: 12px;
            height: 12px;
            stroke: white;
            fill: none;
        }

        .title {
            font-size: 1.6rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.35rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
            margin: 0 1.5rem;
        }

        /* Form */
        .form-container {
            padding: 1.5rem 2rem 2rem;
        }

        .form-section-label {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            font-size: 0.82rem;
            font-weight: 500;
        }

        .label-optional {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 400;
            background: rgba(100,116,139,0.12);
            padding: 0.1rem 0.45rem;
            border-radius: 999px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            stroke: var(--text-muted);
            fill: none;
            transition: stroke 0.2s;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem 0.9rem 0.7rem 2.35rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px var(--ring-blue);
        }

        .form-group input:focus + .input-icon,
        .input-wrap:focus-within .input-icon {
            stroke: var(--accent-blue);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Botão principal */
        .button {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.2px;
            margin-top: 0.5rem;
        }

        .button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }

        .button:hover::before { background: rgba(255,255,255,0.08); }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(34,197,94,0.3), 0 4px 12px rgba(59,130,246,0.2);
        }

        .button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        .button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Forms visibilidade */
        #loginForm, #registerForm {
            display: none;
        }

        .active-form {
            display: block !important;
            animation: fadeInUp 0.35s ease;
        }

        /* Footer do form */
        .form-footer {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .form-footer a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .form-footer a:hover {
            color: var(--accent-green);
        }

        /* Tags de segurança */
        .security-badges {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(30,41,59,0.6);
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.68rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .badge svg {
            width: 12px;
            height: 12px;
            stroke: var(--accent-green);
            fill: none;
        }

        /* Toast */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            z-index: 9999;
            pointer-events: none;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            min-width: 260px;
            max-width: 340px;
            pointer-events: all;
            animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        .toast.hiding {
            animation: toastOut 0.25s ease forwards;
        }

        .toast-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toast-icon svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .toast.success { border-left: 3px solid var(--accent-green); }
        .toast.success .toast-icon { background: rgba(34,197,94,0.15); }
        .toast.success .toast-icon svg { stroke: var(--accent-green); }

        .toast.error { border-left: 3px solid #f87171; }
        .toast.error .toast-icon { background: rgba(248,113,113,0.15); }
        .toast.error .toast-icon svg { stroke: #f87171; }

        .toast.info { border-left: 3px solid var(--accent-blue); }
        .toast.info .toast-icon { background: rgba(59,130,246,0.15); }
        .toast.info .toast-icon svg { stroke: var(--accent-blue); }

        .toast-body { flex: 1; }

        .toast-message {
            font-size: 0.82rem;
            color: var(--text-primary);
            font-weight: 500;
            line-height: 1.4;
        }

        .toast-close {
            flex-shrink: 0;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0.1rem;
            transition: color 0.2s;
            line-height: 1;
        }

        .toast-close:hover { color: var(--text-primary); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px) scale(0.95); }
            to   { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to   { opacity: 0; transform: translateX(40px) scale(0.95); }
        }

        @media (max-width: 480px) {
            #toast-container {
                bottom: 1rem;
                right: 1rem;
                left: 1rem;
            }
            .toast { max-width: 100%; }
        }

        /* Responsividade */
        @media (max-width: 480px) {
            body { padding: 0; align-items: flex-start; }
            .container { max-width: 100%; margin: 0; }
            .card { border-radius: 0; }
            .form-container { padding: 1.2rem 1.5rem 2rem; }
            .header { padding: 1.5rem 1.5rem 1.25rem; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>
    <div class="bg-mesh"><div class="bg-orb"></div></div>

    <div class="container">
        <div class="card">
            <div class="card-accent-bar"></div>

            <!-- Botão alternar -->
            <div class="toggle-auth" id="toggleAuth">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                </svg>
                <div class="tooltip" id="authTooltip">Registrar</div>
            </div>

            <!-- Header -->
            <div class="header">
                <div class="logo-wrap">
                    <div class="logo">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                        </svg>
                    </div>
                    <div class="logo-badge">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                </div>
                <h1 class="title">BiblioTech</h1>
                <p class="subtitle" id="authSubtitle">Sistema de Gerenciamento de Biblioteca</p>
            </div>

            <div class="divider"></div>

            <!-- Formulários -->
            <div class="form-container">

                <!-- Login -->
                <div id="loginForm" class="active-form">
                    <p class="form-section-label">Acesse sua conta</p>
                    <form id="loginFormElement">
                        <div class="form-group">
                            <label for="username">
                                Usuário
                            </label>
                            <div class="input-wrap">
                                <input type="text" id="username" name="username" placeholder="Digite seu usuário" required>
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="password">Senha</label>
                            <div class="input-wrap">
                                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </div>
                        </div>
                        <button type="submit" class="button" id="loginButton">Acessar Biblioteca</button>
                        <div class="form-footer">
                            Não tem uma conta? <a id="showRegisterLink">Registre-se gratuitamente</a>
                        </div>
                    </form>
                    <div class="security-badges">
                        <span class="badge">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                            Seguro
                        </span>
                        <span class="badge">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            Criptografado
                        </span>
                        <span class="badge">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            24/7 Online
                        </span>
                    </div>
                </div>

                <!-- Registro -->
                <div id="registerForm">
                    <p class="form-section-label">Criar nova conta</p>
                    <form id="registerFormElement">
                        <div class="form-group">
                            <label for="fullName">Nome Completo</label>
                            <div class="input-wrap">
                                <input type="text" id="fullName" name="fullName" placeholder="Seu nome completo" required>
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="cpf">
                                CPF
                                <span class="label-optional">opcional</span>
                            </label>
                            <div class="input-wrap">
                                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14">
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="5" width="20" height="14" rx="2"></rect>
                                    <line x1="2" y1="10" x2="22" y2="10"></line>
                                </svg>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="phone">Telefone</label>
                            <div class="input-wrap">
                                <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" maxlength="15" required>
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17z"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="newUsername">Usuário</label>
                            <div class="input-wrap">
                                <input type="text" id="newUsername" name="newUsername" placeholder="Escolha um nome de usuário" required>
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="2" y1="12" x2="22" y2="12"></line>
                                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">Senha</label>
                            <div class="input-wrap">
                                <input type="password" id="newPassword" name="newPassword" placeholder="Escolha uma senha segura" required>
                                <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </div>
                        </div>
                        <button type="submit" class="button" id="registerButton">Criar Conta</button>
                        <div class="form-footer">
                            Já tem uma conta? <a id="showLoginLink">Fazer login</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script>
        const ICONS = {
            success: `<polyline points="20 6 9 17 4 12"></polyline>`,
            error:   `<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>`,
            info:    `<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>`
        };

        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">${ICONS[type]}</svg>
                </div>
                <div class="toast-body">
                    <p class="toast-message">${message}</p>
                </div>
                <button class="toast-close" aria-label="Fechar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            `;

            const dismiss = () => {
                toast.classList.add('hiding');
                toast.addEventListener('animationend', () => toast.remove(), { once: true });
            };

            toast.querySelector('.toast-close').addEventListener('click', dismiss);
            container.appendChild(toast);
            setTimeout(dismiss, duration);
        }

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${wsProtocol}//${window.location.host}/ws`);
        socket.addEventListener('open', () => console.log("Conectado ao WebSocket"));
        socket.addEventListener('message', (msg) => {
            const response = JSON.parse(msg["data"]);
            const action = response["action"];
            switch (action) {
                case 'connection:opened':
                    localStorage.setItem("sessionId", response['sessionId']);
                    break;
            }
        });
        socket.addEventListener('error', (error) => console.error("Erro na conexão WebSocket:", error));

        const toggleAuth     = document.getElementById('toggleAuth');
        const loginForm      = document.getElementById('loginForm');
        const registerForm   = document.getElementById('registerForm');
        const authSubtitle   = document.getElementById('authSubtitle');
        const authTooltip    = document.getElementById('authTooltip');
        const showRegisterLink = document.getElementById('showRegisterLink');
        const showLoginLink  = document.getElementById('showLoginLink');
        const loginFormElement    = document.getElementById('loginFormElement');
        const registerFormElement = document.getElementById('registerFormElement');
        const cpfInput   = document.getElementById('cpf');
        const phoneInput = document.getElementById('phone');

        let isLoginMode = true;

        if (cpfInput) {
            cpfInput.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 9)      v = v.replace(/^(\d{3})(\d{3})(\d{3})(\d{1,2})$/, '$1.$2.$3-$4');
                else if (v.length > 6) v = v.replace(/^(\d{3})(\d{3})(\d{1,3})$/, '$1.$2.$3');
                else if (v.length > 3) v = v.replace(/^(\d{3})(\d{1,3})$/, '$1.$2');
                e.target.value = v;
            });
        }

        if (phoneInput) {
            phoneInput.addEventListener('input', function(e) {
                let v = e.target.value.replace(/\D/g, '').slice(0, 11);
                if (v.length > 10)     v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
                else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4,5})(\d{0,4})$/, '($1) $2-$3');
                else if (v.length > 2) v = v.replace(/^(\d{2})(\d{0,5})$/, '($1) $2');
                e.target.value = v;
            });
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;

            if (isLoginMode) {
                loginForm.classList.add('active-form');
                registerForm.classList.remove('active-form');
                authSubtitle.textContent = 'Sistema de Gerenciamento de Biblioteca';
                authTooltip.textContent  = 'Registrar';
                toggleAuth.querySelector('svg').innerHTML = `
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <line x1="20" y1="8" x2="20" y2="14"></line>
                    <line x1="23" y1="11" x2="17" y2="11"></line>
                `;
            } else {
                loginForm.classList.remove('active-form');
                registerForm.classList.add('active-form');
                authSubtitle.textContent = 'Crie sua conta gratuitamente';
                authTooltip.textContent  = 'Login';
                toggleAuth.querySelector('svg').innerHTML = `
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                `;
            }

            document.querySelector('.form-container').scrollTop = 0;
        }

        toggleAuth.addEventListener('click', toggleAuthMode);
        showRegisterLink.addEventListener('click', () => { if (isLoginMode) toggleAuthMode(); });
        showLoginLink.addEventListener('click',    () => { if (!isLoginMode) toggleAuthMode(); });

        loginFormElement.addEventListener('submit', function(e) {
            e.preventDefault();
            const button = document.getElementById('loginButton');
            const originalText = button.textContent;
            button.textContent = 'Verificando...';
            button.disabled = true;

            const username = document.getElementsByName("username")[0].value;
            const password = document.getElementsByName("password")[0].value;

            socket.send(JSON.stringify({ action: "user:login", payload: { username, password } }));

            const onLoginMessage = (msg) => {
                const msgParsed = JSON.parse(msg.data);
                if (msgParsed["action"] == "user:login") {
                    button.textContent = originalText;
                    button.disabled = false;
                    socket.removeEventListener("message", onLoginMessage);
                    if (msgParsed["response"] !== "OK") {
                        showToast(`${username}, suas credenciais estão inválidas. Tente novamente.`, 'error');
                    } else {
                        showToast(`${username}, acesso concedido! Verifique o terminal.`, 'success');
                        setTimeout(() => location.reload(), 1500);
                    }
                }
            };
            socket.addEventListener("message", onLoginMessage);
        });

        registerFormElement.addEventListener('submit', function(e) {
            e.preventDefault();
            const button = document.getElementById('registerButton');
            const originalText = button.textContent;
            button.textContent = 'Criando conta...';
            button.disabled = true;

            const nome     = document.getElementsByName("fullName")[0].value;
            const cpf      = document.getElementsByName("cpf")[0].value;
            const telefone = document.getElementsByName("phone")[0].value;
            const username = document.getElementsByName("newUsername")[0].value;
            const password = document.getElementsByName("newPassword")[0].value;

            socket.send(JSON.stringify({ action: "user:register", payload: { nome, cpf, telefone, username, password } }));

            const onMessage = (msg) => {
                const msgParsed = JSON.parse(msg.data);
                if (msgParsed.action === "user:register") {
                    if (msgParsed.response === "OK") {
                        showToast('Registro realizado com sucesso! Você já pode fazer login.', 'success');
                        setTimeout(() => { location.reload(); toggleAuthMode(); }, 1500);
                    } else if (msgParsed.response === "USERNAME_TAKEN") {
                        showToast('Esse nome de usuário já está em uso. Escolha outro.', 'error');
                    } else if (msgParsed.response === "MISSING_FIELDS") {
                        showToast('Por favor, preencha todos os campos obrigatórios.', 'error');
                    } else {
                        showToast(`Erro no registro: ${msgParsed.detail || 'Tente novamente.'}`, 'error');
                    }
                    button.textContent = originalText;
                    button.disabled = false;
                    socket.removeEventListener("message", onMessage);
                }
            };
            socket.addEventListener("message", onMessage);
        });

    </script>
</body>
</html>
